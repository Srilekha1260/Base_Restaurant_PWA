# Render Blueprint for the NestJS API (free tier).
# In Render: New + → Blueprint → pick this repo. It reads this file.
# Fill the `sync: false` secrets in the dashboard after the service is created.
services:
  - type: web
    name: restaurant-api
    runtime: node
    plan: free
    region: oregon
    # Build the shared types + API, generate the Prisma client, and apply
    # migrations to the database (idempotent — safe on every deploy).
    buildCommand: >-
      corepack enable &&
      pnpm install --frozen-lockfile &&
      pnpm --filter=@restaurant/types build &&
      pnpm --filter=@restaurant/api exec prisma generate &&
      pnpm --filter=@restaurant/api exec prisma migrate deploy &&
      pnpm --filter=@restaurant/api build
    startCommand: node apps/api/dist/main.js
    envVars:
      - key: NODE_VERSION
        value: "20"
      # Neon connection string (use the POOLED url). Paste in dashboard.
      - key: DATABASE_URL
        sync: false
      # Auto-generated strong secrets — no need to set these yourself.
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      # Stripe test-mode secret key (sk_test_...).
      - key: STRIPE_SECRET_KEY
        sync: false
      # Optional: order-confirmation emails (Resend). Omit to log instead of send.
      - key: RESEND_API_KEY
        sync: false
      - key: ORDER_FROM_EMAIL
        sync: false
      # The 4 Vercel frontend URLs — needed for CORS. Set after deploying them.
      - key: WEB_URL
        sync: false
      - key: STAFF_URL
        sync: false
      - key: KITCHEN_URL
        sync: false
      - key: ADMIN_URL
        sync: false
